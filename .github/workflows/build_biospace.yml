name: Build BioSpace Monitor APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build project files
        run: python3 build_project.py

      - name: Download Gradle wrapper
        run: |
          cd BioSpace
          curl -L "https://services.gradle.org/distributions/gradle-8.0-bin.zip" -o gradle-8.0-bin.zip
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -L "https://github.com/gradle/gradle/raw/v8.0.0/gradlew" -o gradlew
          chmod +x gradlew
          curl -L "https://github.com/gradle/gradle-wrapper-jar/raw/main/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar

      - name: Build APK
        run: |
          cd BioSpace
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BioSpace-Monitor-debug.apk
          path: BioSpace/app/build/outputs/apk/debug/app-debug.apk
