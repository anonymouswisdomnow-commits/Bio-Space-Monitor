name: Build BioSpace Monitor APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Project Structure
        run: python3 build_project.py

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.1.1
          build-root-directory: ./BioSpace

      - name: Compile APK
        working-directory: ./BioSpace
        run: |
          # We use the system gradle we just set up instead of the wrapper
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BioSpace-Monitor-Build
          path: BioSpace/app/build/outputs/apk/debug/app-debug.apk
          
