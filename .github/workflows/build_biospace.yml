name: Build BioSpace Monitor APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build project files
        run: python3 build_project.py

      - name: Setup Gradle and Build
        run: |
          cd BioSpace
          # Create the exact folder structure needed
          mkdir -p gradle/wrapper
          # Download the wrapper files directly into the folders
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew -o gradlew
          chmod +x gradlew
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          # Run the build
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BioSpace-Monitor-debug-apk
          path: BioSpace/app/build/outputs/apk/debug/app-debug.apk
          
