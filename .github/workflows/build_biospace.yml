name: Build BioSpace Monitor APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run Python Builder
        run: python3 build_project.py

      - name: Generate Gradle Files
        working-directory: ./BioSpace
        run: |
          # This command creates the wrapper files correctly
          gradle wrapper --gradle-version 8.1.1
          chmod +x gradlew

      - name: Compile APK
        working-directory: ./BioSpace
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BioSpace-Monitor-Build
          path: BioSpace/app/build/outputs/apk/debug/app-debug.apk
          
