name: Build BioSpace Monitor APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Project Structure
        run: python3 build_project.py

      - name: Install Gradle Wrapper
        working-directory: ./BioSpace
        run: |
          # This uses a built-in Gradle command to generate the wrapper properly
          gradle wrapper --gradle-version 8.0.2

      - name: Build APK
        working-directory: ./BioSpace
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BioSpace-Monitor-debug-apk
          path: BioSpace/app/build/outputs/apk/debug/app-debug.apk
          
