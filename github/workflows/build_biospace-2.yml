name: Build BioSpace Monitor APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build project files
        run: python3 build_project.py

      - name: Install Gradle wrapper
        run: |
          cd BioSpace
          mkdir -p gradle/wrapper
          # Download wrapper jar from Gradle's own releases
          curl -fL "https://github.com/gradle/gradle/releases/download/v8.0.0/gradle-8.0-bin.zip" \
            -o /tmp/gradle-8.0-bin.zip
          unzip -j /tmp/gradle-8.0-bin.zip \
            "gradle-8.0/lib/gradle-wrapper-*.jar" \
            -d gradle/wrapper/
          mv gradle/wrapper/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar
          # Write wrapper properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
          # Write gradlew script
          cat > gradlew << 'EOF'
#!/bin/sh
exec java -classpath "gradle/wrapper/gradle-wrapper.jar" \
  org.gradle.wrapper.GradleWrapperMain "$@"
EOF
          chmod +x gradlew

      - name: Build APK
        run: |
          cd BioSpace
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BioSpace-Monitor-debug.apk
          path: BioSpace/app/build/outputs/apk/debug/app-debug.apk
